<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aurora ✦ Noche Estrellada</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:system-ui,sans-serif;touch-action:none}
canvas{display:block;position:fixed;top:0;left:0;width:100vw;height:100dvh}
#info{
  position:fixed;bottom:30px;left:0;right:0;text-align:center;z-index:10;
  color:rgba(255,255,255,0.15);font-size:12px;pointer-events:none;letter-spacing:2px;
  transition:opacity 2s
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">✦ Tocá o mové el mouse para crear aurora</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H;

function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
resize();addEventListener('resize',resize);

// === Stars ===
const stars=[];
for(let i=0;i<300;i++){
  stars.push({
    x:Math.random()*W,y:Math.random()*H,
    r:Math.random()*1.5+0.3,
    a:Math.random()*0.8+0.1,
    s:Math.random()*0.02+0.005,
    p:Math.random()*Math.PI*2
  });
}

const shootingStars=[];

// === Aurora ===
const aurora=[];
const MAX_AURORA=80;
let mouseX=W/2,mouseY=H/2;

function addAurora(x,y){
  if(aurora.length>MAX_AURORA)aurora.shift();
  for(let i=0;i<3;i++){
    const hue=150+Math.random()*120+Math.sin(x*0.01)*40;
    aurora.push({
      x:x+(Math.random()-0.5)*40,y:y+(Math.random()-0.5)*20,
      vx:(Math.random()-0.5)*0.5,vy:-Math.random()*0.3-0.1,
      life:1,size:Math.random()*6+3,
      hue:hue,sat:80+Math.random()*20,lig:50+Math.random()*30
    });
  }
}

// === Fireflies ===
const fireflies=[];
for(let i=0;i<50;i++){
  fireflies.push({
    x:Math.random()*W,y:Math.random()*H,
    vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,
    size:Math.random()*2+1,
    phase:Math.random()*Math.PI*2,
    freq:Math.random()*0.02+0.005,
    targetX:0,targetY:0
  });
}

// === Shooting stars spawner ===
setInterval(()=>{
  if(Math.random()<0.3){
    shootingStars.push({
      x:Math.random()*W*0.8,
      y:Math.random()*H*0.3,
      vx:Math.random()*6+3,
      vy:Math.random()*3+1.5,
      life:1
    });
  }
},2000);

// === Events ===
c.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;addAurora(e.clientX,e.clientY)});
c.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.touches[0];mouseX=t.clientX;mouseY=t.clientY;
  addAurora(t.clientX,t.clientY);
},{passive:false});
c.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];mouseX=t.clientX;mouseY=t.clientY;
  for(let i=0;i<5;i++)addAurora(t.clientX+(Math.random()-0.5)*30,t.clientY+(Math.random()-0.5)*30);
},{passive:false});

// === Mountains ===
const mountains=[];
for(let i=0;i<100;i++){
  mountains.push({
    x:(i/100)*W,y:H-80-Math.sin(i*0.1)*60-Math.sin(i*0.3)*30-Math.random()*10,
    h:Math.sin(i*0.1)*60+Math.sin(i*0.3)*30+Math.random()*10+30
  });
}

// === Draw loop ===
let time=0;

function loop(t){
  time=t;

  // Sky gradient
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0a0a2e');
  grad.addColorStop(0.3,'#0f0f3a');
  grad.addColorStop(0.5,'#1a0a2e');
  grad.addColorStop(0.7,'#1a0520');
  grad.addColorStop(1,'#0a0a12');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  // Stars
  for(const s of stars){
    const a=s.a*(0.6+0.4*Math.sin(t*0.001*s.s+s.p));
    ctx.globalAlpha=a;
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    // Glow
    const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*3);
    g.addColorStop(0,`rgba(255,255,255,${a*0.3})`);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(s.x,s.y,s.r*3,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Shooting stars
  for(let i=shootingStars.length-1;i>=0;i--){
    const s=shootingStars[i];
    s.x+=s.vx;s.y+=s.vy;s.life-=0.008;
    if(s.life<=0){shootingStars.splice(i,1);continue}
    ctx.globalAlpha=s.life;
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(s.x,s.y);
    ctx.lineTo(s.x-s.vx*4,s.y-s.vy*4);
    ctx.stroke();
    const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,15*(1-s.life+0.5));
    g.addColorStop(0,`rgba(255,255,255,${s.life*0.5})`);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(s.x,s.y,15*(1-s.life+0.5),0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Aurora
  for(let i=aurora.length-1;i>=0;i--){
    const a=aurora[i];
    a.x+=a.vx;a.y+=a.vy;a.vx+=(Math.random()-0.5)*0.02;a.vy+=(Math.random()-0.5)*0.01;
    a.life-=0.008;
    if(a.life<=0||a.y>H||a.y<0){aurora.splice(i,1);continue}
    const alpha=a.life*0.25;
    const g=ctx.createRadialGradient(a.x,a.y,0,a.x,a.y,a.size*a.life*3);
    g.addColorStop(0,`hsla(${a.hue},${a.sat}%,${a.lig}%,${alpha})`);
    g.addColorStop(0.5,`hsla(${a.hue+20},${a.sat-10}%,${a.lig-10}%,${alpha*0.5})`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(a.x,a.y,a.size*a.life*3,0,Math.PI*2);ctx.fill();
  }

  // Aurora curtain (wave effect)
  const curtainAlpha=0.03+0.02*Math.sin(t*0.0003)+0.02*Math.sin(t*0.0007);
  for(let y=0;y<H*0.6;y+=6){
    const wave=Math.sin(y*0.02+t*0.0005)*30+Math.sin(y*0.04+t*0.0008)*15;
    const hue=180+Math.sin(y*0.01+t*0.0004)*40+Math.sin(t*0.0002)*20;
    const alpha=curtainAlpha*(1-y/(H*0.6))*Math.max(0,Math.sin(y*0.008+t*0.0006));
    ctx.globalAlpha=alpha;
    ctx.strokeStyle=`hsl(${hue},80%,60%)`;
    ctx.lineWidth=2;
    ctx.beginPath();
    for(let x=0;x<W;x+=4){
      const wy=wave+Math.sin(x*0.005+y*0.02+t*0.0003)*20;
      ctx.lineTo(x,y+wy);
    }
    ctx.stroke();
  }
  ctx.globalAlpha=1;

  // Mountains
  ctx.fillStyle='#0a0a12';
  ctx.beginPath();ctx.moveTo(0,H);
  for(const m of mountains)ctx.lineTo(m.x,m.y);
  ctx.lineTo(W,H);ctx.closePath();ctx.fill();

  ctx.fillStyle='#0d0d1a';
  ctx.beginPath();ctx.moveTo(0,H);
  for(const m of mountains)ctx.lineTo(m.x-5,m.y+15+Math.sin(m.x*0.02)*10);
  ctx.lineTo(W,H);ctx.closePath();ctx.fill();

  // Tree silhouettes
  for(let i=0;i<15;i++){
    const tx=i*W/14+Math.sin(i*3)*20;
    const ty=H-80-Math.sin(tx*0.1)*60-Math.sin(tx*0.3)*30-Math.random()*10-5;
    drawTree(tx,ty,Math.random()*8+15);
  }

  // Fireflies
  for(const f of fireflies){
    const dx=mouseX-f.x,dy=mouseY-f.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<200){
      f.vx+=dx/dist*0.05;
      f.vy+=dy/dist*0.05;
    }
    f.vx+=(Math.random()-0.5)*0.05;
    f.vy+=(Math.random()-0.5)*0.05;
    f.vx*=0.98;f.vy*=0.98;
    f.x+=f.vx;f.y+=f.vy;
    if(f.x<0)f.x=W;if(f.x>W)f.x=0;
    if(f.y<0)f.y=H;if(f.y>H)f.y=0;
    const glow=0.5+0.5*Math.sin(t*0.003*f.freq+f.phase);
    const alpha=glow*0.4;
    ctx.globalAlpha=alpha;
    ctx.fillStyle='#ffee88';
    ctx.shadowColor='#ffee88';
    ctx.shadowBlur=15*glow;
    ctx.beginPath();ctx.arc(f.x,f.y,f.size*glow,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;

  // Info fade
  const info=document.getElementById('info');
  if(t>4000)info.style.opacity='0';

  requestAnimationFrame(loop);
}

function drawTree(x,y,h){
  ctx.fillStyle='#050510';
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(x-h*0.15,y-h*0.6);
  ctx.lineTo(x+h*0.15,y-h*0.6);
  ctx.closePath();ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x-h*0.12,y-h*0.3);
  ctx.lineTo(x,y-h);
  ctx.lineTo(x+h*0.12,y-h*0.3);
  ctx.closePath();ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x-h*0.08,y-h*0.6);
  ctx.lineTo(x,y-h*0.85);
  ctx.lineTo(x+h*0.08,y-h*0.6);
  ctx.closePath();ctx.fill();
}

requestAnimationFrame(loop);
</script>
</body>
</html>
