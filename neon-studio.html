<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aurora ✦ Noche Estrellada</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:system-ui,sans-serif;touch-action:none}
canvas{display:block;position:fixed;top:0;left:0;width:100vw;height:100dvh}
#info{position:fixed;bottom:30px;left:0;right:0;text-align:center;z-index:10;color:rgba(255,255,255,0.15);font-size:12px;pointer-events:none;letter-spacing:2px;transition:opacity 2s}
#overlay{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0;transition:opacity .4s;pointer-events:none}
#overlay.show{opacity:1;pointer-events:auto}
#input-row{display:flex;gap:6px;align-items:center;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);padding:5px 10px 5px 14px;border-radius:18px;border:1px solid rgba(255,255,255,0.06)}
#input-row input{background:none;border:none;color:#fff;font-size:15px;outline:none;font-family:inherit;width:110px;letter-spacing:1px}
#input-row input::placeholder{color:rgba(255,255,255,0.12)}
#input-row button{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);border-radius:10px;padding:3px 9px;cursor:pointer;font-size:12px;font-family:inherit;transition:background .15s}
#input-row button:active{background:rgba(255,255,255,0.12)}
#color-row{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
#color-row button{padding:4px 8px;border-radius:10px;border:1px solid rgba(255,255,255,0.05);background:rgba(0,0,0,0.3);color:rgba(255,255,255,0.25);font-size:10px;cursor:pointer;font-family:inherit;backdrop-filter:blur(4px);transition:all .15s}
#color-row button.active{background:rgba(255,255,255,0.08);color:#fff;border-color:rgba(255,255,255,0.15)}
#tog-btn{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:11;background:rgba(0,0,0,0.3);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.2);border-radius:16px;padding:6px 14px;font-size:11px;cursor:pointer;font-family:inherit;transition:opacity .5s}
#tog-btn:active{background:rgba(255,255,255,0.05)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">✦ Tocá o mové el mouse para crear aurora</div>
<div id="overlay">
  <div id="input-row">
    <input id="name-input" type="text" placeholder="Escribí un nombre..." maxlength="16">
    <button id="apply-btn">✨</button>
  </div>
  <div id="color-row"></div>
</div>
<button id="tog-btn">✎ Nombre</button>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H;

function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
resize();addEventListener('resize',resize);

// === Input ===
const overlay=document.getElementById('overlay');
const togBtn=document.getElementById('tog-btn');
const nameInput=document.getElementById('name-input');
let showInput=false;
togBtn.onclick=()=>{showInput=!showInput;overlay.classList.toggle('show',showInput);togBtn.style.opacity=showInput?'0':'1'};

// === Color modes ===
const COLOR_MODES=[
  {n:'🌈 Arcoíris',fn:(t,phase)=>({h:(t*0.02+phase*360)%360,s:100,l:65})},
  {n:'💖 Rosa',fn:(t,phase)=>({h:330+Math.sin(t*0.001+phase)*15,s:90,l:60+Math.sin(t*0.002+phase)*10})},
  {n:'💙 Azul',fn:(t,phase)=>({h:200+Math.sin(t*0.001+phase)*20,s:80,l:55+Math.sin(t*0.002+phase)*10})},
  {n:'💚 Verde',fn:(t,phase)=>({h:120+Math.sin(t*0.001+phase)*20,s:80,l:50+Math.sin(t*0.002+phase)*10})},
  {n:'🟡 Dorado',fn:(t,phase)=>({h:45+Math.sin(t*0.001+phase)*10,s:90,l:55+Math.sin(t*0.002+phase)*10})},
  {n:'🤍 Blanco',fn:(t,phase)=>({h:0,s:0,l:85+Math.sin(t*0.002+phase)*10})},
  {n:'🎨 Pastel',fn:(t,phase)=>({h:(t*0.005+phase*360)%360,s:40,l:75})},
];
let curColor=0;
const colorRow=document.getElementById('color-row');
COLOR_MODES.forEach((m,i)=>{
  const b=document.createElement('button');
  b.textContent=m.n;b.className=i===0?'active':'';
  b.onclick=()=>{colorRow.querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');curColor=i};
  colorRow.appendChild(b);
});

document.getElementById('apply-btn').onclick=()=>{
  displayName=nameInput.value.trim();
  if(displayName){showInput=false;overlay.classList.remove('show');togBtn.style.opacity='1';initName()}
};
nameInput.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('apply-btn').onclick()});

// === Stars ===
const stars=[];
for(let i=0;i<350;i++){stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.3,a:Math.random()*0.8+0.1,s:Math.random()*0.02+0.005,p:Math.random()*Math.PI*2})}
const shootingStars=[];

// === Aurora ===
const aurora=[];
const MAX_AURORA=80;
let mouseX=W/2,mouseY=H/2;
function addAurora(x,y){
  if(aurora.length>MAX_AURORA)aurora.shift();
  for(let i=0;i<3;i++){const hue=150+Math.random()*120+Math.sin(x*0.01)*40;
    aurora.push({x:x+(Math.random()-0.5)*40,y:y+(Math.random()-0.5)*20,vx:(Math.random()-0.5)*0.5,vy:-Math.random()*0.3-0.1,life:1,size:Math.random()*6+3,hue:hue,sat:80+Math.random()*20,lig:50+Math.random()*30})}
}

const fireflies=[];
for(let i=0;i<50;i++){fireflies.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,size:Math.random()*2+1,phase:Math.random()*Math.PI*2,freq:Math.random()*0.02+0.005})}

setInterval(()=>{if(Math.random()<0.3)shootingStars.push({x:Math.random()*W*0.8,y:Math.random()*H*0.3,vx:Math.random()*6+3,vy:Math.random()*3+1.5,life:1})},2000);

// === Name ===
let displayName='';
let nameAngle=0;
let dragging=false,dragStartX=0,lastAngle=0;

function initName(){
  nameAngle=0;
}

// === Mountains ===
const mountains=[];
for(let i=0;i<100;i++){mountains.push({x:(i/100)*W,y:H-80-Math.sin(i*0.1)*60-Math.sin(i*0.3)*30-Math.random()*10,h:Math.sin(i*0.1)*60+Math.sin(i*0.3)*30+Math.random()*10+30})}

// === Events ===
c.addEventListener('mousemove',e=>{
  mouseX=e.clientX;mouseY=e.clientY;addAurora(e.clientX,e.clientY);
  if(dragging){const dx=e.clientX-dragStartX;nameAngle=lastAngle+dx*0.008}
});
c.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];mouseX=t.clientX;mouseY=t.clientY;addAurora(t.clientX,t.clientY);
  if(dragging){const dx=t.clientX-dragStartX;nameAngle=lastAngle+dx*0.008}
},{passive:false});
c.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];mouseX=t.clientX;mouseY=t.clientY;for(let i=0;i<5;i++)addAurora(t.clientX+(Math.random()-0.5)*30,t.clientY+(Math.random()-0.5)*30);
  if(displayName){dragging=true;dragStartX=t.clientX;lastAngle=nameAngle}
},{passive:false});
c.addEventListener('mousedown',e=>{
  if(displayName){dragging=true;dragStartX=e.clientX;lastAngle=nameAngle}
});
c.addEventListener('mouseup',()=>{if(dragging){dragging=false;lastAngle=nameAngle}});
c.addEventListener('touchend',()=>{if(dragging){dragging=false;lastAngle=nameAngle}});
c.addEventListener('touchcancel',()=>{if(dragging){dragging=false;lastAngle=nameAngle}});

// === Draw ===
let time=0;
function drawTree(x,y,h){
  ctx.fillStyle='#050510';
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-h*0.15,y-h*0.6);ctx.lineTo(x+h*0.15,y-h*0.6);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(x-h*0.12,y-h*0.3);ctx.lineTo(x,y-h);ctx.lineTo(x+h*0.12,y-h*0.3);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(x-h*0.08,y-h*0.6);ctx.lineTo(x,y-h*0.85);ctx.lineTo(x+h*0.08,y-h*0.6);ctx.closePath();ctx.fill();
}

function loop(t){
  time=t;
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0a0a2e');grad.addColorStop(0.3,'#0f0f3a');grad.addColorStop(0.5,'#1a0a2e');grad.addColorStop(0.7,'#1a0520');grad.addColorStop(1,'#0a0a12');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  // Stars
  for(const s of stars){const a=s.a*(0.6+0.4*Math.sin(t*0.001*s.s+s.p));ctx.globalAlpha=a;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill()}
  ctx.globalAlpha=1;

  // Shooting stars
  for(let i=shootingStars.length-1;i>=0;i--){const s=shootingStars[i];s.x+=s.vx;s.y+=s.vy;s.life-=0.008;if(s.life<=0){shootingStars.splice(i,1);continue}ctx.globalAlpha=s.life;ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.vx*4,s.y-s.vy*4);ctx.stroke()}
  ctx.globalAlpha=1;

  // Aurora
  for(let i=aurora.length-1;i>=0;i--){const a=aurora[i];a.x+=a.vx;a.y+=a.vy;a.vx+=(Math.random()-0.5)*0.02;a.vy+=(Math.random()-0.5)*0.01;a.life-=0.008;if(a.life<=0||a.y>H||a.y<0){aurora.splice(i,1);continue}const al=a.life*0.25;const g=ctx.createRadialGradient(a.x,a.y,0,a.x,a.y,a.size*a.life*3);g.addColorStop(0,`hsla(${a.hue},${a.sat}%,${a.lig}%,${al})`);g.addColorStop(0.5,`hsla(${a.hue+20},${a.sat-10}%,${a.lig-10}%,${al*0.5})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(a.x,a.y,a.size*a.life*3,0,Math.PI*2);ctx.fill()}

  // Aurora curtain
  const ca=0.03+0.02*Math.sin(t*0.0003);
  for(let y=0;y<H*0.6;y+=6){const wv=Math.sin(y*0.02+t*0.0005)*30+Math.sin(y*0.04+t*0.0008)*15;const hu=180+Math.sin(y*0.01+t*0.0004)*40+Math.sin(t*0.0002)*20;const al=ca*(1-y/(H*0.6))*Math.max(0,Math.sin(y*0.008+t*0.0006));ctx.globalAlpha=al;ctx.strokeStyle=`hsl(${hu},80%,60%)`;ctx.lineWidth=2;ctx.beginPath();for(let x=0;x<W;x+=4)ctx.lineTo(x,y+wv+Math.sin(x*0.005+y*0.02+t*0.0003)*20);ctx.stroke()}
  ctx.globalAlpha=1;

  // Name text
  if(displayName){
    const cx=W/2,cy=H*0.3;
    const fs=Math.min(W/displayName.length*0.9,H*0.17);
    const col=COLOR_MODES[curColor].fn(t,0);
    const pulse=0.95+0.05*Math.sin(t*0.001);
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(nameAngle);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font=`700 ${fs}px 'Dancing Script',cursive,sans-serif`;
    ctx.letterSpacing='4px';
    const hsl=`hsl(${col.h},${col.s}%,${col.l}%)`;
    ctx.shadowColor=hsl;
    ctx.shadowBlur=35;
    ctx.fillStyle=hsl;
    ctx.globalAlpha=pulse;
    ctx.fillText(displayName,0,0);
    ctx.shadowBlur=50;
    ctx.globalAlpha=pulse*0.3;
    ctx.fillText(displayName,0,0);
    ctx.restore();
    ctx.globalAlpha=1;
  }

  // Mountains
  ctx.fillStyle='#0a0a12';ctx.beginPath();ctx.moveTo(0,H);for(const m of mountains)ctx.lineTo(m.x,m.y);ctx.lineTo(W,H);ctx.closePath();ctx.fill();
  ctx.fillStyle='#0d0d1a';ctx.beginPath();ctx.moveTo(0,H);for(const m of mountains)ctx.lineTo(m.x-5,m.y+15+Math.sin(m.x*0.02)*10);ctx.lineTo(W,H);ctx.closePath();ctx.fill();
  for(let i=0;i<15;i++){const tx=i*W/14+Math.sin(i*3)*20;const ty=H-80-Math.sin(tx*0.1)*60-Math.sin(tx*0.3)*30-Math.random()*10-5;drawTree(tx,ty,Math.random()*8+15)}

  // Fireflies
  for(const f of fireflies){const dx=mouseX-f.x,dy=mouseY-f.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<200){f.vx+=dx/dist*0.05;f.vy+=dy/dist*0.05}f.vx+=(Math.random()-0.5)*0.05;f.vy+=(Math.random()-0.5)*0.05;f.vx*=0.98;f.vy*=0.98;f.x+=f.vx;f.y+=f.vy;if(f.x<0)f.x=W;if(f.x>W)f.x=0;if(f.y<0)f.y=H;if(f.y>H)f.y=0;const g=0.5+0.5*Math.sin(t*0.003*f.freq+f.phase);ctx.globalAlpha=g*0.4;ctx.fillStyle='#ffee88';ctx.shadowColor='#ffee88';ctx.shadowBlur=15*g;ctx.beginPath();ctx.arc(f.x,f.y,f.size*g,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0}
  ctx.globalAlpha=1;

  if(t>4000)document.getElementById('info').style.opacity='0';
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
