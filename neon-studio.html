<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Studio ✨</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;color:#fff}
canvas{display:block;position:fixed;top:0;left:0;width:100vw;height:100dvh;touch-action:none}
#panel{
  position:fixed;bottom:0;left:0;right:0;z-index:100;pointer-events:none;
  background:linear-gradient(transparent,rgba(0,0,0,0.85));
  padding:10px 8px 14px;display:flex;flex-direction:column;gap:6px;
  max-height:60vh;overflow-y:auto;-webkit-overflow-scrolling:touch
}
#panel>*{pointer-events:auto}
#panel::-webkit-scrollbar{display:none}
.sec{display:flex;flex-direction:column;gap:3px}
.lbl{font-size:8px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.2);padding:0 2px}
#modos{display:flex;gap:3px;flex-wrap:wrap}
#modos button{
  padding:5px 9px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);
  background:rgba(0,0,0,0.5);color:rgba(255,255,255,0.35);font-size:9px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;font-family:inherit;white-space:nowrap;pointer-events:auto;
  backdrop-filter:blur(4px);transition:all .15s
}
#modos button.active{background:rgba(255,255,255,0.1);color:#fff;border-color:rgba(255,255,255,0.2)}
#modos button:active{transform:scale(0.93)}
#cols{display:flex;gap:4px;flex-wrap:wrap}
#cols button{
  width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,0.04);
  cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;pointer-events:auto
}
#cols button.active{border-color:#fff;transform:scale(1.2)}
#ctrls{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
#ctrls button{
  height:30px;padding:0 10px;border-radius:7px;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);
  color:rgba(255,255,255,0.45);font-size:10px;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;gap:3px;-webkit-tap-highlight-color:transparent;pointer-events:auto
}
#ctrls button:active{background:rgba(255,255,255,0.07)}
#sld{-webkit-appearance:none;height:2px;border-radius:2px;background:rgba(255,255,255,0.06);width:40px;pointer-events:auto}
#sld::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.25);border:none;cursor:pointer}
#sv{font-size:9px;color:rgba(255,255,255,0.15);min-width:14px;text-align:center}
#toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);padding:14px 22px;border-radius:10px;
  color:#fff;font-size:20px;font-weight:300;pointer-events:none;
  opacity:0;transition:opacity .3s;text-align:center
}
#toast.show{opacity:1}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="toast"></div>
<div id="panel">
  <div class="sec"><div class="lbl">✦ Modo</div><div id="modos"></div></div>
  <div class="sec"><div class="lbl">● Color</div><div id="cols"></div></div>
  <div class="sec"><div class="lbl">⚙ Controles</div><div id="ctrls"></div></div>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H,CX,CY;

function resize(){
  W=c.width=innerWidth;H=c.height=innerHeight;
  CX=W/2;CY=H/2;
  ctx.fillStyle='#0a0a12';ctx.fillRect(0,0,W,H);
}
resize();addEventListener('resize',resize);

const COLS=['#ff2d55','#ff9500','#ffcc00','#34c759','#00c7be','#007aff','#af52de','#fff'];
let curC=3;
const colsEl=document.getElementById('cols');
COLS.forEach((c,i)=>{
  const b=document.createElement('button');
  b.style.background=c;b.className=i===curC?'active':'';
  b.onclick=()=>{colsEl.querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');curC=i};
  colsEl.appendChild(b);
});

// modo functions reciben (x,y) y devuelven array de puntos espejados
function modoCaleido(x,y){
  const dx=x-CX,dy=y-CY,d=Math.hypot(dx,dy),a=Math.atan2(dy,dx);
  const r=[];
  for(let i=0;i<8;i++){const ang=a+i*Math.PI/4;
    r.push(CX+Math.cos(ang)*d,CY+Math.sin(ang)*d);
    r.push(CX+Math.cos(-ang)*d,CY+Math.sin(-ang)*d)}
  return r;
}
function modoEspejo(x,y){return[x,y,W-x,y,x,H-y,W-x,H-y]}
function modoFlor(x,y){
  const dx=x-CX,dy=y-CY,d=Math.hypot(dx,dy),a=Math.atan2(dy,dx);const r=[];
  for(let i=0;i<6;i++){const ang=a+i*Math.PI/3;
    r.push(CX+Math.cos(ang)*d,CY+Math.sin(ang)*d)}
  for(let i=0;i<6;i++){const ang=-a+i*Math.PI/3;
    r.push(CX+Math.cos(ang)*d*0.55,CY+Math.sin(ang)*d*0.55)}
  return r;
}
function modoEspiral(x,y){
  const dx=x-CX,dy=y-CY,d=Math.hypot(dx,dy),a=Math.atan2(dy,dx);const r=[];
  for(let i=0;i<10;i++){const ang=a+i*Math.PI/5,rd=d*(1+i*0.12);
    r.push(CX+Math.cos(ang)*rd,CY+Math.sin(ang)*rd)}
  return r;
}
function modoMandala(x,y){
  const dx=x-CX,dy=y-CY,d=Math.hypot(dx,dy),a=Math.atan2(dy,dx);const r=[];
  for(let i=0;i<12;i++){const ang=a+i*Math.PI/6;
    r.push(CX+Math.cos(ang)*d,CY+Math.sin(ang)*d)}
  for(let i=0;i<12;i++){const ang=-a+i*Math.PI/6;
    r.push(CX+Math.cos(ang)*d*0.45,CY+Math.sin(ang)*d*0.45)}
  return r;
}
function modoOlas(x,y){
  const dx=x-CX,dy=y-CY,d=Math.hypot(dx,dy),a=Math.atan2(dy,dx),w=Math.sin(d*0.03)*25;const r=[];
  for(let i=-3;i<=3;i++){
    r.push(CX+Math.cos(a+Math.sin(d*0.02+i)*0.35)*(d+w+i*8),CY+Math.sin(a+Math.sin(d*0.02+i)*0.35)*(d+w+i*8));
    r.push(CX+Math.cos(-a+Math.cos(d*0.02+i)*0.35)*(d-w+i*8),CY+Math.sin(-a+Math.cos(d*0.02+i)*0.35)*(d-w+i*8))}
  return r;
}
function modoLirios(x,y){
  const a=Math.atan2(y-CY,x-CX),dist=Math.hypot(x-CX,y-CY);
  const sz=Math.min(dist*1.15,Math.max(W,H)*0.65);const r=[];
  for(let i=0;i<6;i++){const ang=a+i*Math.PI/3,cr=0.35+0.1*Math.sin(i*2);
    r.push(CX+Math.cos(ang)*sz,CY+Math.sin(ang)*sz);
    r.push(CX+Math.cos(ang-cr)*sz*0.7,CY+Math.sin(ang-cr)*sz*0.7);
    r.push(CX+Math.cos(ang+cr)*sz*0.7,CY+Math.sin(ang+cr)*sz*0.7);
    r.push(CX+Math.cos(ang-cr*0.5)*sz*0.3,CY+Math.sin(ang-cr*0.5)*sz*0.3);
    r.push(CX+Math.cos(ang+cr*0.5)*sz*0.3,CY+Math.sin(ang+cr*0.5)*sz*0.3)}
  for(let i=0;i<6;i++){const ang=a+i*Math.PI/3+Math.PI/6;
    r.push(CX+Math.cos(ang)*sz*0.12,CY+Math.sin(ang)*sz*0.12)}
  return r;
}
function modoCopo(x,y){
  const a=Math.atan2(y-CY,x-CX),d=Math.min(Math.hypot(x-CX,y-CY),Math.max(W,H)*0.6);const r=[];
  for(let i=0;i<6;i++){const ang=a+i*Math.PI/3;
    for(let t=1;t<=5;t++){const rd=d*t/5,sp=rd*0.12*Math.sin(t*2.5);
      r.push(CX+Math.cos(ang-sp/rd)*rd,CY+Math.sin(ang-sp/rd)*rd);
      r.push(CX+Math.cos(ang+sp/rd)*rd,CY+Math.sin(ang+sp/rd)*rd)}}
  return r;
}
function modoEstrella(x,y){
  const a=Math.atan2(y-CY,x-CX),d=Math.hypot(x-CX,y-CY);const r=[];
  for(let i=0;i<5;i++){const ang=a+i*Math.PI*2/5;r.push(CX+Math.cos(ang)*d,CY+Math.sin(ang)*d)}
  for(let i=0;i<5;i++){const ang=a+Math.PI/5+i*Math.PI*2/5;r.push(CX+Math.cos(ang)*d*0.4,CY+Math.sin(ang)*d*0.4)}
  return r;
}
function modoArcoiris(x,y){
  const a=Math.atan2(y-CY,x-CX),d=Math.hypot(x-CX,y-CY);const r=[];
  for(let i=0;i<8;i++){const ang=a+i*Math.PI/4;r.push(CX+Math.cos(ang)*(d+Math.sin(i)*15),CY+Math.sin(ang)*(d+Math.sin(i)*15))}
  for(let i=0;i<8;i++){const ang=-a+i*Math.PI/4;r.push(CX+Math.cos(ang)*(d*0.6+Math.cos(i)*10),CY+Math.sin(ang)*(d*0.6+Math.cos(i)*10))}
  return r;
}
function modoHexagono(x,y){
  const a=Math.atan2(y-CY,x-CX),d=Math.hypot(x-CX,y-CY);const r=[];
  for(let i=0;i<6;i++){const ang=a+i*Math.PI/3;r.push(CX+Math.cos(ang)*d,CY+Math.sin(ang)*d)}
  for(let i=0;i<6;i++){const ang=-a+i*Math.PI/3;r.push(CX+Math.cos(ang)*d*0.3,CY+Math.sin(ang)*d*0.3)}
  return r;
}

const MODOS=[
  {n:'🌀 Caleidoscopio',fn:modoCaleido},
  {n:'🪞 Espejo',fn:modoEspejo},
  {n:'🌺 Flor',fn:modoFlor},
  {n:'🌌 Espiral',fn:modoEspiral},
  {n:'🌀 Mándala',fn:modoMandala},
  {n:'🌊 Olas',fn:modoOlas},
  {n:'⚜️ Lirios',fn:modoLirios},
  {n:'❄️ Copo',fn:modoCopo},
  {n:'⭐ Estrella',fn:modoEstrella},
  {n:'🌈 Arcoíris',fn:modoArcoiris},
  {n:'🔮 Hexágono',fn:modoHexagono},
];
let curM=0;
const modosEl=document.getElementById('modos');
MODOS.forEach((m,i)=>{
  const b=document.createElement('button');
  b.textContent=m.n;b.className=i===0?'active':'';
  b.onclick=()=>{modosEl.querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');curM=i;toast(m.n)};
  modosEl.appendChild(b);
});

// Drawing
let drawing=false,lx=0,ly=0;
let strokes=[]; // almacena {x1,y1,x2,y2,color,size}
let history=[];
const MAX_H=50;
let size=3;

function col(){return COLS[curC]}

function drawLine(x1,y1,x2,y2){
  const pts1=MODOS[curM].fn(x1,y1);
  const pts2=MODOS[curM].fn(x2,y2);
  const color=col();
  ctx.lineWidth=size;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.strokeStyle=color;
  for(let i=0;i<pts1.length&&i<pts2.length;i+=2){
    ctx.beginPath();ctx.moveTo(pts1[i],pts1[i+1]);ctx.lineTo(pts2[i],pts2[i+1]);ctx.stroke()}
  strokes.push({x1,y1,x2,y2,color,size});
}

function drawDot(x,y){
  const pts=MODOS[curM].fn(x,y);
  const color=col();ctx.fillStyle=color;
  for(let i=0;i<pts.length;i+=2){
    ctx.beginPath();ctx.arc(pts[i],pts[i+1],size*0.6,0,Math.PI*2);ctx.fill()}
}

function redrawAll(){
  ctx.fillStyle='#0a0a12';ctx.fillRect(0,0,W,H);
  for(const s of strokes){
    const pts1=MODOS[curM].fn(s.x1,s.y1);
    const pts2=MODOS[curM].fn(s.x2,s.y2);
    ctx.lineWidth=s.size;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle=s.color;
    for(let i=0;i<pts1.length&&i<pts2.length;i+=2){
      ctx.beginPath();ctx.moveTo(pts1[i],pts1[i+1]);ctx.lineTo(pts2[i],pts2[i+1]);ctx.stroke()}
  }
}

function saveState(){
  if(history.length>=MAX_H)history.shift();
  history.push(strokes.map(s=>({...s})));
}
function undo(){
  if(history.length<1)return;
  strokes=history.pop();redrawAll();toast('↩ Deshecho');
}
function clearAll(){
  strokes=[];history=[];ctx.fillStyle='#0a0a12';ctx.fillRect(0,0,W,H);toast('✕ Borrado');
}
function saveImg(){
  redrawAll();const a=document.createElement('a');a.download='neon-art.png';a.href=c.toDataURL('image/png');a.click();toast('⬇ Guardado');
}
function randMode(){
  const r=Math.floor(Math.random()*MODOS.length);
  modosEl.querySelectorAll('button').forEach((b,i)=>b.classList.toggle('active',i===r));curM=r;
  redrawAll();toast('🎲 '+MODOS[r].n);
}
let bgI=0;
function cycleBg(){
  bgI=(bgI+1)%4;
  const bs=['#0a0a12','#1a0a2e'];ctx.fillStyle=bs[bgI<2?bgI:'#0a0a12'];ctx.fillRect(0,0,W,H);
  if(bgI===2||bgI===3){
    if(bgI===2)for(let y=0;y<H;y+=2){ctx.fillStyle=`hsl(${y/H*360},80%,5%)`;ctx.fillRect(0,y,W,2)}
    else{ctx.fillStyle='#05051a';ctx.fillRect(0,0,W,H);for(let i=0;i<100;i++){ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.4})`;ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,Math.random()*1.5+0.3,0,Math.PI*2);ctx.fill()}}
  }
  redrawAll();
  const lb=['◉ Negro','◉ Morado','◉ Arcoíris','◉ Estrellas'];toast(lb[bgI]);
}

// Controls
const ctrlsEl=document.getElementById('ctrls');
const ctrls=[
  ['↩','Deshacer',undo],['✕','Borrar',clearAll],['⬇','Guardar',saveImg],
  ['🎲','Aleatorio',randMode],['◉','Fondo',cycleBg],
];
ctrls.forEach(([icon,label,fn])=>{
  const b=document.createElement('button');
  b.innerHTML=`<span style="font-size:12px">${icon}</span> ${label}`;
  b.onclick=fn;ctrlsEl.appendChild(b);
});
const sld=document.createElement('input');sld.id='sld';sld.type='range';sld.min=1;sld.max=8;sld.step=0.5;sld.value=3;
sld.oninput=function(){size=parseFloat(this.value);document.getElementById('sv').textContent=this.value};
ctrlsEl.appendChild(sld);
const sv=document.createElement('span');sv.id='sv';sv.textContent='3';ctrlsEl.appendChild(sv);

// Events
function gp(e){
  const r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;
  return {x:t.clientX-r.left,y:t.clientY-r.top};
}
function st(e){e.preventDefault();const p=gp(e);saveState();drawing=true;lx=p.x;ly=p.y;drawDot(p.x,p.y)}
function mv(e){e.preventDefault();if(!drawing)return;const p=gp(e);drawLine(lx,ly,p.x,p.y);lx=p.x;ly=p.y}
function en(e){e.preventDefault();drawing=false}

c.addEventListener('touchstart',st,{passive:false});
c.addEventListener('touchmove',mv,{passive:false});
c.addEventListener('touchend',en,{passive:false});
c.addEventListener('touchcancel',en,{passive:false});
c.addEventListener('mousedown',st);
c.addEventListener('mousemove',mv);
c.addEventListener('mouseup',en);
c.addEventListener('mouseleave',en);

// Toast
let to=null;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(to);to=setTimeout(()=>t.classList.remove('show'),1000);
}
</script>
</body>
</html>
